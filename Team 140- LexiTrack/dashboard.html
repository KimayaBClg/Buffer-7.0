<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LexiTrack | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; font-family: 'Inter', sans-serif; color: #d1d5db; margin: 0; }
        .dark-card { background: #121212; border: 1px solid #222; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-64 border-r border-zinc-900 p-6 flex flex-col bg-[#0f0f0f]">
        <h1 class="text-2xl font-bold text-white mb-10 italic tracking-tighter uppercase">LEXI<span class="text-amber-500">TRACK</span></h1>
        <nav class="flex-1 space-y-2">
            <a href="/dashboard" class="flex items-center px-4 py-3 bg-zinc-900 text-amber-500 rounded-xl border border-zinc-800 font-medium">
                <i class="fa-solid fa-gauge-high mr-3"></i> Dashboard
            </a>
        </nav>
        <a href="/logout" class="pt-6 border-t border-zinc-900 text-zinc-600 hover:text-red-400 flex items-center px-4 py-3 transition">
            <i class="fa-solid fa-power-off mr-3"></i> Exit
        </a>
    </aside>

    <main class="flex-1 flex flex-col bg-[#0f0f0f]">
        <header class="h-20 border-b border-zinc-900 flex items-center justify-between px-10">
            <h2 class="text-2xl font-bold text-white tracking-tight">Active Tracking</h2>
            <form action="/upload" method="POST" enctype="multipart/form-data" class="flex items-center space-x-3">
                <label class="cursor-pointer bg-zinc-900 border border-zinc-800 px-5 py-3 rounded-xl text-sm font-semibold hover:bg-zinc-800 transition">
                    <i class="fa-solid fa-plus mr-2 text-amber-500"></i> New Doc
                    <input type="file" name="file" class="hidden" onchange="this.form.submit()">
                </label>
                <button type="submit" class="bg-amber-600 text-black px-6 py-3 rounded-xl font-bold text-sm hover:bg-amber-500 transition">Process</button>
            </form>
        </header>

        <div class="p-10 overflow-y-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {% for doc in docs %}
                <div class="dark-card rounded-2xl p-6 hover:border-amber-600/50 transition duration-300">
                    <div class="flex justify-between items-start mb-6 gap-4">
                        <h3 class="text-2xl font-bold text-white truncate leading-tight flex-1">{{ doc.name }}</h3>
                        <div class="flex space-x-2 shrink-0">
                            <a href="/calendar/{{ doc.id }}" class="p-2.5 bg-zinc-900 rounded-lg text-zinc-500 hover:text-amber-500 border border-zinc-800 transition"><i class="fa-solid fa-calendar-day text-lg"></i></a>
                            <form action="/delete/{{ doc.id }}" method="POST" onsubmit="return confirm('Delete permanently?');"><button type="submit" class="p-2.5 bg-zinc-900 rounded-lg text-zinc-600 hover:text-red-500 border border-zinc-800 transition"><i class="fa-solid fa-trash-can text-lg"></i></button></form>
                        </div>
                    </div>
                    <div class="p-4 bg-zinc-900/40 rounded-xl border border-zinc-800/50 mb-4 text-sm italic text-zinc-500 line-clamp-3 leading-relaxed">"{{ doc.snippet }}"</div>
                    <div class="text-[10px] text-zinc-600 tracking-wider uppercase font-bold flex items-center"><i class="fa-solid fa-fingerprint mr-2 text-zinc-700"></i> {{ doc.uploaded_at }}</div>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>
</body>
</html>
